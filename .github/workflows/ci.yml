name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gates:
    name: Python 3.12 gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Verify locked dependencies
        run: uv lock --check

      - name: Sync development environment
        run: uv sync --locked --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --cov=mneme --cov-report=term-missing --cov-fail-under=84

      - name: Type check public package
        run: uv run mypy src/mneme

      - name: Build source and wheel artifacts
        run: uv build --out-dir dist --clear --no-build-logs

      - name: Install built wheel and run fixture report
        run: |
          uv venv .ci-install
          uv pip install --python .ci-install/bin/python dist/*.whl
          .ci-install/bin/python -c "import mneme; print(mneme.__version__)"
          .ci-install/bin/mneme eval fixtures --out .artifacts/ci/fixtures.json

      - name: Validate release artifacts against checklist
        run: |
          .ci-install/bin/python -m mneme.release.validate_artifacts --dist dist --fixture-report .artifacts/ci/fixtures.json --out .artifacts/ci/release-artifacts.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: mneme-ci-artifacts
          path: |
            dist/*
            .artifacts/ci/*.json
          if-no-files-found: ignore
