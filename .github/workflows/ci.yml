name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gates:
    name: Python 3.12 gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run tests
        run: python -m pytest

      - name: Type check public package
        run: python -m mypy src/mneme

      - name: Build source and wheel artifacts
        run: python -m build

      - name: Install built wheel and run fixture report
        run: |
          python -m venv .ci-install
          .ci-install/bin/python -m pip install --upgrade pip
          .ci-install/bin/python -m pip install dist/*.whl
          .ci-install/bin/python -c "import mneme; print(mneme.__version__)"
          .ci-install/bin/python -m mneme.cli eval fixtures --out .artifacts/ci/fixtures.json

      - name: Validate release artifacts against checklist
        run: |
          .ci-install/bin/python -m mneme.release.validate_artifacts --dist dist --fixture-report .artifacts/ci/fixtures.json --out .artifacts/ci/release-artifacts.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mneme-ci-artifacts
          path: |
            dist/*
            .artifacts/ci/*.json
          if-no-files-found: ignore
